# fly.toml app configuration file generated for ntwaza2026 on 2026-02-25T20:30:23Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ntwaza2026'
primary_region = 'lhr'

[build]
  dockerfile = "ntwaza-backend/Dockerfile"

[env]
  PORT = "8080"
  FLASK_ENV = "production"
  PYTHONUNBUFFERED = "1"
  RATELIMIT_STORAGE_URL = "memory://"
  RATELIMIT_STRATEGY = "fixed-window"

[processes]
  app = "gunicorn --bind 0.0.0.0:8080 --workers 1 --threads 2 --timeout 120 run:app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[deploy]
  release_command = "flask db upgrade"
